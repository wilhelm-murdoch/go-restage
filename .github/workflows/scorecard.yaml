# OpenSSF Scorecard: audits the repo's supply-chain posture (pinned actions,
# token permissions, branch protection, ...) and publishes the score so the
# README badge and https://scorecard.dev stay current.
name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 11 * * 6" # Saturdays 11:15 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      id-token: write # publish results to the OpenSSF REST API
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
