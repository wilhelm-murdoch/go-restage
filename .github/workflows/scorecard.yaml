# OpenSSF Scorecard: audits the repo's supply-chain posture (pinned actions,
# token permissions, branch protection, ...) and publishes the score so the
# README badge and https://scorecard.dev stay current.
name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 11 * * 6" # Saturdays 11:15 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      id-token: write # publish results to the OpenSSF REST API
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          sarif_file: results.sarif
