# Releasing is: push a semver tag (e.g. `git tag v0.2.0 && git push origin
# v0.2.0`). This re-verifies the tagged commit, then publishes a GitHub
# Release with notes generated from the merged PRs since the previous tag.
# A library ships no binaries, so there is nothing to build or upload.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: go vet ./...
      - run: CGO_ENABLED=0 go test -count=1 ./...
      - run: CGO_ENABLED=1 go test -race -count=1 ./...

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes
