# Tests, race detection, lint, and coverage. Steps delegate to Makefile
# targets wherever possible so this stays in lockstep with the Woodpecker
# pipeline (.woodpecker/workflow.yaml) and local runs — change the Makefile,
# not this file. Actions are pinned to commit SHAs (the tag in the comment is
# informational); dependabot keeps them fresh.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # "1.26.x" is the declared minimum in go.mod; "stable" tracks the
        # newest Go release so we hear about breakage before consumers do.
        go: ["1.26.x", "stable"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: false # no dependencies, nothing to cache (and no go.sum)
      # Raw go commands rather than make: the Windows runner image ships no
      # GNU Make. Keep these two lines in sync with the vet/test targets.
      - run: go vet ./...
      - run: go test -count=1 ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: make race

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: make lint

  cover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: make cover # enforces the floor defined in the Makefile
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
