# GitHub Actions equivalent of .woodpecker/workflow.yaml.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch: # the Woodpecker "manual" event

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -count=1 ./...

  race:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1" # the race detector requires CGO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Pinned the same way as the Makefile and Woodpecker, so all three
      # run byte-for-byte the same linter.
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...
