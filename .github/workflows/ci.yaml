# Tests, race detection, lint, and coverage. Actions are pinned to commit
# SHAs (the tag in the comment is informational); dependabot keeps them fresh.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # "1.26.x" is the declared minimum in go.mod; "stable" tracks the
        # newest Go release so we hear about breakage before consumers do.
        go: ["1.26.x", "stable"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: false # no dependencies, nothing to cache (and no go.sum)
      - run: go vet ./...
      - run: go test -count=1 ./...

  race:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1" # the race detector requires CGO
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      # Pinned the same way as the Makefile, so CI and local runs use
      # byte-for-byte the same linter.
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...

  cover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: go test -count=1 -coverprofile=coverage.out ./...
      - name: Enforce coverage floor
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')
          echo "total coverage: ${total}% (floor: 80%)"
          awk -v t="$total" 'BEGIN { exit (t < 80.0) ? 1 : 0 }'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
