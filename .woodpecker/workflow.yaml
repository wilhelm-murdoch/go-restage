# Homelab pre-flight: runs the same Makefile targets as GitHub Actions
# (.github/workflows/) so a green build here means a green build there —
# minus the macOS/Windows legs and CodeQL, which only exist on GitHub.
# Change the Makefile, not this file.
#
# The cron event is for the weekly govulncheck sweep: add a cron in the
# Woodpecker repo settings and the whole pipeline (vuln included) reruns
# against the live vulnerability database.
when:
  - event: [manual, push, pull_request, cron]

steps:
  - name: vet
    image: golang:1.26
    commands:
      - make vet

  # The declared minimum from go.mod...
  - name: test
    image: golang:1.26
    commands:
      - make test

  # ...and the newest Go release, mirroring the GitHub matrix.
  - name: test-latest
    image: golang:latest
    commands:
      - make test

  # The race target sets CGO_ENABLED=1 itself; the golang image carries the
  # C toolchain the race detector needs.
  - name: race
    image: golang:1.26
    commands:
      - make race

  - name: lint
    image: golang:1.26
    commands:
      - make lint

  - name: cover
    image: golang:1.26
    commands:
      - make cover

  - name: vuln
    image: golang:1.26
    commands:
      - make vuln

  - name: notify-success
    image: curlimages/curl
    when:
      - status: success
    commands: |
      #!/usr/bin/env bash
      curl -s -X POST https://notify.nightcity.network/notify/apprise \
        -H "Content-Type: application/json" \
        -d '{"type":"success","tag":"automations","title":"Woodpecker CI: go-restage Workflow","body":"The project was tested and released successfully."}'

  - name: notify-failure
    image: curlimages/curl
    when:
      - status: failure
    commands: |
      #!/usr/bin/env bash
      curl -s -X POST https://notify.nightcity.network/notify/apprise \
        -H "Content-Type: application/json" \
        -d '{"type":"failure","tag":"automations","title":"Woodpecker CI: go-restage Workflow","body":"The project failed its test suite."}'
